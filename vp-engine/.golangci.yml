run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gocritic
    - bodyclose
    - contextcheck
    - errorlint
    - exhaustive
    - gosec
    - nilerr
    - prealloc
    - unconvert

linters-settings:
  goimports:
    local-prefixes: github.com/vicionpower/vp-engine
  errorlint:
    errorf: true
    asserts: true
    comparison: true
  gosec:
    excludes:
      - G404  # math/rand is OK in non-crypto contexts (we use crypto/rand explicitly elsewhere)

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck]
    - path: sqlc/generated/
      linters: [revive, gocritic]
