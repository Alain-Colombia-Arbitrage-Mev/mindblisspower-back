# sops creation rules. When you `sops <file>`, sops looks up the matching rule
# by path_regex and encrypts with the listed age recipients.
#
# Rotate keys: add the new recipient to the list, run `sops updatekeys *.enc.yaml`,
# then remove the old recipient. The file stays decryptable throughout.

creation_rules:
  - path_regex: secrets/production\.enc\.yaml$
    age: >-
      age1prod_host_app01_replace_with_real_pubkey,
      age1prod_host_app02_replace_with_real_pubkey,
      age1prod_host_worker01_replace_with_real_pubkey,
      age1ops_alain_replace_with_real_pubkey

  - path_regex: secrets/staging\.enc\.yaml$
    age: >-
      age1staging_host_replace_with_real_pubkey,
      age1ops_alain_replace_with_real_pubkey

  - path_regex: secrets/dev\.enc\.yaml$
    age: age1ops_alain_replace_with_real_pubkey
