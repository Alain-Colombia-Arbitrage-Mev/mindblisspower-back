# pg_hba.conf — VicionPower primary (db-01)
# All public connections rejected by firewall; this layer is defense-in-depth.

# TYPE   DATABASE      USER            ADDRESS              METHOD
local    all           postgres                             peer
host     all           postgres        127.0.0.1/32         scram-sha-256

# PgBouncer on the same host
host     vicionpower   app_write       127.0.0.1/32         scram-sha-256
host     vicionpower   app_read        127.0.0.1/32         scram-sha-256
host     vicionpower   app_admin       127.0.0.1/32         scram-sha-256

# Private network — apps & workers talk to PgBouncer (6432), not directly here.
# But ops connects directly for migrations.
host     vicionpower   migrator        10.0.1.0/24          scram-sha-256
host     vicionpower   app_admin       10.0.1.0/24          scram-sha-256

# Replication user — only from replica's private IP
host     replication   replicator      10.0.1.20/32         scram-sha-256

# Reject everything else
host     all           all             0.0.0.0/0            reject
host     all           all             ::/0                 reject
