[global]
repo1-type=sftp
repo1-sftp-host=u123456.your-storagebox.de
repo1-sftp-host-user=u123456
repo1-sftp-host-key-hash-type=sha256
repo1-sftp-host-fingerprint=CHANGEME-storagebox-fingerprint
repo1-sftp-private-key-file=/var/lib/postgresql/.ssh/storagebox
repo1-path=/pgbackrest

# Cipher the backup before upload (Storage Box is shared infra)
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass=CHANGEME-32-byte-random

repo1-retention-full=4              # keep 4 weekly fulls (~1 month)
repo1-retention-diff=2
repo1-retention-archive=14
repo1-retention-archive-type=diff

# Compression — zstd level 6 trades CPU vs. transfer time well on AX52
compress-type=zst
compress-level=6
compress-level-network=3

start-fast=y
delta=y
log-level-console=info
log-level-file=detail
process-max=4
buffer-size=16MiB

[vicionpower]
pg1-path=/var/lib/postgresql/17/main
pg1-port=5432
pg1-user=postgres
