name: Deploy
on:
  push: { branches: [main] }
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions: { contents: read, packages: write }
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
        working-directory: backend/app
      - run: bun typecheck
        working-directory: backend/app
      - run: bun test
        working-directory: backend/app
      - id: meta
        run: echo "image=ghcr.io/vicionpower/app:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend/app
          push: true
          tags: |
            ghcr.io/vicionpower/app:${{ github.sha }}
            ghcr.io/vicionpower/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  schema-guard:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Verify the DDL checksum matches what's deployed in prod. If a developer
      # edited schema_mlm.sql but no migration was reviewed, this fails.
      - name: Compare DDL checksum
        env:
          DATABASE_URL: ${{ secrets.DB_READONLY_URL }}
        run: |
          local_sum=$(sha256sum backend/_meta/schema_mlm.sql | awk '{print $1}')
          remote_sum=$(psql "$DATABASE_URL" -tAc "SELECT current_setting('app.schema_checksum', true)")
          if [ "$local_sum" != "$remote_sum" ]; then
            echo "Schema drift! local=$local_sum remote=$remote_sum"
            echo "Run reviewed DDL migration before deploying app."
            exit 1
          fi

  deploy:
    needs: [build, schema-guard]
    runs-on: ubuntu-24.04
    strategy:
      matrix: { host: [app-01.internal, app-02.internal] }
      max-parallel: 1                      # rolling restart, one at a time
    steps:
      - name: SSH deploy
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=accept-new \
            -o ProxyCommand="cloudflared access ssh --hostname bastion.vicionpower.com" \
            deploy@${{ matrix.host }} <<EOF
            set -euo pipefail
            docker pull "$IMAGE"
            docker tag  "$IMAGE" vicionpower-app:current
            sudo systemctl restart vicionpower-app
            # Smoke
            for i in {1..20}; do
              if curl -sf http://127.0.0.1:3000/health; then exit 0; fi
              sleep 2
            done
            echo "health check failed"; exit 1
          EOF
