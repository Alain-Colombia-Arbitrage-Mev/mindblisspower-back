name: deploy

# staging → EC2 staging · main → EC2 prod. Compila binarios arm64 y los
# despliega por SSH (systemd restart). Los .env viven en el server (no en CI).
on:
  push:
    branches: [main, staging]

concurrency:
  group: deploy-back-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: vp-engine/go.mod
          cache-dependency-path: vp-engine/go.sum

      - name: Gate (compile) + cross-build arm64
        working-directory: vp-engine
        run: |
          go build ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o /tmp/vp-payments ./cmd/vp-payments
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o /tmp/vp-engine   ./cmd/vp-engine

      - name: Resolve target host
        id: t
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "host=${{ vars.PROD_HOST }}" >> "$GITHUB_OUTPUT"; echo "env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "host=${{ vars.STAGING_HOST }}" >> "$GITHUB_OUTPUT"; echo "env=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH (${{ steps.t.outputs.env }})
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ steps.t.outputs.host }}
          USER: ${{ vars.SSH_USER }}
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "$KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          SSHO="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i $HOME/.ssh/deploy_key"
          scp $SSHO /tmp/vp-payments /tmp/vp-engine "$USER@$HOST:/tmp/"
          ssh $SSHO "$USER@$HOST" 'set -e
            sudo install -m 0755 /tmp/vp-payments /opt/vicion/bin/vp-payments
            sudo install -m 0755 /tmp/vp-engine   /opt/vicion/bin/vp-engine
            rm -f /tmp/vp-payments /tmp/vp-engine
            sudo systemctl restart vp-engine vp-payments
            sleep 3
            echo "vp-payments=$(systemctl is-active vp-payments) vp-engine=$(systemctl is-active vp-engine)"
            curl -fsS http://127.0.0.1:9095/health >/dev/null && echo "health OK" || { echo "HEALTH FAIL"; exit 1; }'
