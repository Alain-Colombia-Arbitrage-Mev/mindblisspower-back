name: deploy
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "git-SHA a desplegar (rollback)"
        required: true
      environment:
        description: "prod|staging"
        required: true
        default: prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::522814703714:role/vp-gha-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: resolve target
        id: t
        run: |
          ENV="${{ inputs.environment }}"
          TAG="${{ inputs.tag }}"
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Formato targets: "inst|compose|svc1 svc2;inst|compose|svc1 svc2"
          # Campos por '|' (inst, compose, svcs); múltiples targets separados por ';'
          if [ "$ENV" = "prod" ]; then
            echo "targets=i-060e76a6c26bded35|deploy/compose/server1.yml|vp-engine vp-payments;i-02fcc4d2329040711|deploy/compose/server2.yml|api vp-engine" >> "$GITHUB_OUTPUT"
          else
            echo "targets=i-0f7f6c73503537d73|deploy/compose/server2.yml|api vp-engine" >> "$GITHUB_OUTPUT"
          fi

      - name: deploy via SSM
        run: bash _meta/devops/scripts/ci-ssm-deploy.sh "${{ steps.t.outputs.env }}" "${{ steps.t.outputs.tag }}" "${{ steps.t.outputs.targets }}"
